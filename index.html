         app and respect dark backgrounds. Service-worker caching is
         deferred to a follow-up since hand-rolled SW lifecycle without
         a tested integration risks shipping stale assets. -->

    <meta name="theme-color" content="#0b0d12" />
    <meta name="application-name" content="Stretchy Studio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
